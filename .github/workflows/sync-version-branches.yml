name: Sync Version Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branches:
        description: 'Comma-separated list of target branches (default: net8,net9)'
        required: false
        default: 'net8,net9'
        type: string
      dry_run:
        description: 'Run without making changes'
        required: false
        default: false
        type: boolean

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        target_branch: ${{ fromJSON(vars.TARGET_BRANCHES || '["net8","net9"]') }}
      fail-fast: false

    steps:
      - name: Check PAT_TOKEN exists
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::PAT_TOKEN secret is not configured"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Check if sync is needed
        id: check
        run: |
          if ! git ls-remote --heads origin ${{ matrix.target_branch }} | grep -q ${{ matrix.target_branch }}; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "::warning::Target branch ${{ matrix.target_branch }} does not exist"
            exit 0
          fi

          git checkout main
          git checkout ${{ matrix.target_branch }}

          if git merge-base --is-ancestor main ${{ matrix.target_branch }}; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "No new commits to sync"
          else
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            echo "New commits found, sync needed"
          fi

      - name: Sync changes
        if: steps.check.outputs.needs_sync == 'true'
        id: sync
        run: |
          set -euo pipefail

          TARGET="${{ matrix.target_branch }}"
          DOTNET_VER=$(echo "$TARGET" | sed 's/[^0-9]*//g')

          # Create sync branch
          sync_branch="sync-main-to-${TARGET}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$sync_branch" "$TARGET"

          # ── Load .sync-exclude list ──
          # These files have version-specific implementations and must stay as-is on the target branch
          EXCLUDE_FILES=()
          if [ -f ".sync-exclude" ]; then
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -n "$line" ] && EXCLUDE_FILES+=("$line")
            done < .sync-exclude
            echo "📋 Loaded ${#EXCLUDE_FILES[@]} files from .sync-exclude"
          fi

          # ── Determine commits to cherry-pick ──
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git log "${{ github.event.before }}..${{ github.event.after }}" --format="%H" --reverse > /tmp/commits.txt
          else
            merge_base=$(git merge-base "$TARGET" main)
            git log "$merge_base..main" --format="%H" --reverse > /tmp/commits.txt
          fi

          if [ ! -s /tmp/commits.txt ]; then
            echo "No commits found"
            exit 0
          fi

          # ── Filter already-applied commits using git cherry ──
          echo "🔍 Filtering already-applied commits..."
          declare -A applied=()
          cherry_output=$(git cherry "$TARGET" main 2>/dev/null || echo "")
          if [ -n "$cherry_output" ]; then
            while IFS= read -r line; do
              if [[ $line == -* ]]; then
                hash=$(echo "$line" | awk '{print $2}')
                [ -n "$hash" ] && applied["$hash"]=1
              fi
            done <<< "$cherry_output"
          fi

          # ── Cherry-pick commits ──
          successful=0
          skipped=0
          failed_commits=""
          excluded_file_changes=""

          while read -r commit; do
            msg=$(git log -1 --format="%s" "$commit" 2>/dev/null || echo "unknown")

            # Skip if already applied (exact hash or patch match)
            if git branch --contains "$commit" 2>/dev/null | grep -q "$TARGET"; then
              echo "⏭️  Already in branch (exact): $msg"
              skipped=$((skipped + 1))
              continue
            fi
            if [[ -n "${applied[$commit]:-}" ]]; then
              echo "⏭️  Already in branch (patch): $msg"
              skipped=$((skipped + 1))
              continue
            fi

            # Check if this commit touches any excluded files
            commit_files=$(git diff-tree --no-commit-id --name-only -r "$commit" 2>/dev/null || true)
            for excl in "${EXCLUDE_FILES[@]}"; do
              if echo "$commit_files" | grep -qF "$excl"; then
                excluded_file_changes="${excluded_file_changes}\n- \`${commit:0:8}\` ($msg) modified \`$excl\`"
              fi
            done

            # Try cherry-pick
            if git cherry-pick --no-commit "$commit" 2>/dev/null; then
              if git diff --cached --quiet && git diff --quiet; then
                echo "⏭️  Empty after apply: $msg"
                git cherry-pick --abort 2>/dev/null || true
                skipped=$((skipped + 1))
              else
                echo "✅ Applied: $msg"
                successful=$((successful + 1))
              fi
            else
              # Conflict — accept incoming changes for non-excluded files, keep target for excluded
              echo "⚠️  Conflict on: $msg — auto-resolving..."

              # Get list of conflicted files
              conflicted_files=$(git diff --name-only --diff-filter=U 2>/dev/null || true)
              resolved=true

              for file in $conflicted_files; do
                is_excluded=false
                for excl in "${EXCLUDE_FILES[@]}"; do
                  if [ "$file" = "$excl" ]; then
                    is_excluded=true
                    break
                  fi
                done

                if [ "$is_excluded" = true ]; then
                  # Keep target branch version for excluded files
                  git checkout "$TARGET" -- "$file" 2>/dev/null || true
                else
                  # Accept incoming (main) version for everything else
                  git checkout --theirs -- "$file" 2>/dev/null || true
                fi
                git add "$file" 2>/dev/null || true
              done

              if [ "$resolved" = true ] && ! git diff --cached --quiet; then
                echo "✅ Resolved & applied: $msg"
                successful=$((successful + 1))
              else
                echo "❌ Could not resolve: $msg"
                git cherry-pick --abort 2>/dev/null || true
                failed_commits="${failed_commits}\n- ${commit:0:8}: $msg"
              fi
            fi
          done < /tmp/commits.txt

          echo "📊 Summary: $successful applied, $skipped skipped"
          if [ -n "$failed_commits" ]; then
            echo "❌ Failed commits:$failed_commits"
          fi

          # ── Reset version-specific files ──
          echo "📝 Resetting version-specific files..."

          # 1. Reset all .csproj files to target branch
          find . -name "*.csproj" -type f -exec git checkout "$TARGET" -- {} \; 2>/dev/null || true

          # 2. Reset .sync-exclude files to target branch
          for excl in "${EXCLUDE_FILES[@]}"; do
            if git show "${TARGET}:${excl}" >/dev/null 2>&1; then
              git checkout "$TARGET" -- "$excl"
              echo "  Reset excluded: $excl"
            fi
          done

          # 3. Update Directory.Build.props from main with correct version numbers
          if [ -f "src/Directory.Build.props" ]; then
            # Save DotNetAbstractionsVersion from target branch before overwriting
            target_abstractions_version=$(grep -oP '<DotNetAbstractionsVersion>\K[^<]+' src/Directory.Build.props 2>/dev/null || echo "")

            git checkout main -- src/Directory.Build.props

            # Version: e.g. 10.x.x → 8.x.x
            current_version=$(grep -oP '<Version>\K[^<]+' src/Directory.Build.props)
            new_version=$(echo "$current_version" | sed "s/^[0-9]\+\./$DOTNET_VER./")
            sed -i "s|<Version>$current_version</Version>|<Version>$new_version</Version>|g" src/Directory.Build.props

            # TargetFramework: e.g. net10.0 → net8.0
            sed -i "s|<TargetFramework>net[0-9]\+\.0</TargetFramework>|<TargetFramework>net${DOTNET_VER}.0</TargetFramework>|g" src/Directory.Build.props

            # DotNetVersion: e.g. [10.0.0,11.0.0) → [8.0.0,9.0.0)
            next_ver=$((DOTNET_VER + 1))
            sed -i "s|<DotNetVersion>\[[0-9]\+\.0\.0,[0-9]\+\.0\.0)</DotNetVersion>|<DotNetVersion>[${DOTNET_VER}.0.0,${next_ver}.0.0)</DotNetVersion>|g" src/Directory.Build.props

            # Preserve DotNetAbstractionsVersion from target branch if it differs
            if [ -n "$target_abstractions_version" ]; then
              if grep -q '<DotNetAbstractionsVersion>' src/Directory.Build.props; then
                sed -i "s|<DotNetAbstractionsVersion>[^<]*</DotNetAbstractionsVersion>|<DotNetAbstractionsVersion>$target_abstractions_version</DotNetAbstractionsVersion>|g" src/Directory.Build.props
              else
                sed -i "/<DotNetVersion>/a\\        <DotNetAbstractionsVersion>$target_abstractions_version</DotNetAbstractionsVersion>" src/Directory.Build.props
              fi
              echo "  Preserved DotNetAbstractionsVersion: $target_abstractions_version"
            fi

            echo "  Updated Directory.Build.props: Version=$new_version, TF=net${DOTNET_VER}.0, DotNetVersion=[${DOTNET_VER}.0.0,${next_ver}.0.0)"
          fi

          # 4. Reset workflow files to target branch
          if [ -d ".github/workflows" ]; then
            git checkout "$TARGET" -- .github/workflows/ 2>/dev/null || true
          fi

          # ── Stage and commit ──
          git add -A

          echo "📋 Files changed:"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No changes to commit after processing"
            exit 0
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🏃 Dry run — not committing"
            exit 0
          fi

          # Build commit message with failed commits info
          COMMIT_MSG="Sync changes from main to ${TARGET}"
          if [ -n "$failed_commits" ]; then
            COMMIT_MSG="${COMMIT_MSG}

          ⚠️ Commits that could not be applied (need manual review):$(echo -e "$failed_commits")"
          fi

          git commit -m "$COMMIT_MSG"

          # Save excluded file changes for PR comment
          if [ -n "$excluded_file_changes" ]; then
            {
              echo "excluded_file_changes<<EXCL_EOF"
              echo -e "$excluded_file_changes"
              echo "EXCL_EOF"
            } >> $GITHUB_ENV
          fi

          # ── Push ──
          if git push origin "$sync_branch" 2>/dev/null; then
            echo "sync_branch=$sync_branch" >> $GITHUB_ENV
            echo "push_repo=${{ github.repository }}" >> $GITHUB_ENV
          else
            FORK_OWNER="${{ vars.FORK_OWNER || 'arcenox' }}"
            FORK_URL="https://${{ secrets.PAT_TOKEN }}@github.com/${FORK_OWNER}/TickerQ.git"
            git remote add fork "$FORK_URL" 2>/dev/null || git remote set-url fork "$FORK_URL"
            if git push fork "$sync_branch"; then
              echo "sync_branch=$sync_branch" >> $GITHUB_ENV
              echo "push_repo=${FORK_OWNER}/TickerQ" >> $GITHUB_ENV
            else
              echo "::error::Failed to push to both origin and fork"
              exit 1
            fi
          fi

      - name: Ensure labels exist
        if: steps.check.outputs.needs_sync == 'true' && env.sync_branch != ''
        run: |
          gh label create "automated" --description "Automated PR" --color "0E8A16" 2>/dev/null || true
          gh label create "sync" --description "Branch synchronization" --color "1D76DB" 2>/dev/null || true
          gh label create "${{ matrix.target_branch }}" --description "Target: ${{ matrix.target_branch }} branch" --color "FEF2C0" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Create Pull Request
        if: steps.check.outputs.needs_sync == 'true' && env.sync_branch != ''
        run: |
          dotnet_version=$(echo "${{ matrix.target_branch }}" | sed 's/[^0-9]*//g')

          PR_BODY=$(cat << 'PREOF'
          ## Automated Branch Sync

          This PR syncs recent changes from `main` to `${{ matrix.target_branch }}`.

          ### What was done:
          - Cherry-picked new commits from main
          - Updated `Directory.Build.props` versions (10.x.x → ${dotnet_version}.x.x, DotNetVersion range)
          - Preserved all `.csproj` files from ${{ matrix.target_branch }}
          - Preserved version-specific files listed in `.sync-exclude`
          - Skipped commits already in the target branch (patch-level dedup)

          ### Version-specific files (NOT synced):
          Files in `.sync-exclude` have different implementations per .NET version and are kept as-is.

          ---
          _Created automatically by branch sync workflow_
          PREOF
          )

          if [ "${{ env.push_repo }}" = "${{ github.repository }}" ]; then
            gh pr create \
              --base "${{ matrix.target_branch }}" \
              --head "${{ env.sync_branch }}" \
              --title "Sync main → ${{ matrix.target_branch }}" \
              --body "$PR_BODY" \
              2>&1 | tee pr_output.txt
          else
            FORK_OWNER=$(echo "${{ env.push_repo }}" | cut -d'/' -f1)
            gh pr create \
              --base "${{ matrix.target_branch }}" \
              --head "${FORK_OWNER}:${{ env.sync_branch }}" \
              --repo "${{ github.repository }}" \
              --title "Sync main → ${{ matrix.target_branch }}" \
              --body "$PR_BODY" \
              2>&1 | tee pr_output.txt
          fi

          PR_NUMBER=$(grep -oP '(?<=pull/)\d+' pr_output.txt || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "automated,sync,${{ matrix.target_branch }}" 2>/dev/null || true
            echo "Created PR #$PR_NUMBER: https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
            echo "pr_number=$PR_NUMBER" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Comment on PR about excluded file changes
        if: env.pr_number != '' && env.excluded_file_changes != ''
        run: |
          COMMENT_BODY=$(cat << 'COMMENTEOF'
          ⚠️ **Manual review needed — version-specific files were modified on main**

          The following commits changed files listed in `.sync-exclude`. These files have different implementations per .NET version and were **not synced** automatically. You may need to manually apply the equivalent changes to the `${{ matrix.target_branch }}` version:

          ${{ env.excluded_file_changes }}

          **What to do:**
          1. Review each commit above on `main`
          2. Determine if the change needs an equivalent update for `${{ matrix.target_branch }}`
          3. If so, apply the change manually using the version-specific API (e.g., `SetPropertyCalls<T>` instead of `UpdateSettersBuilder<T>`)
          COMMENTEOF
          )

          gh pr comment "${{ env.pr_number }}" --body "$COMMENT_BODY"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

  summary:
    needs: sync-branches
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Generate summary
        run: |
          echo "## Branch Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.sync-branches.result }}" = "success" ]; then
            echo "All branch syncs completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "Some branch syncs failed — check individual job logs" >> $GITHUB_STEP_SUMMARY
          fi
