name: Sync Version Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branches:
        description: 'Comma-separated list of target branches (default: net8,net9)'
        required: false
        default: 'net8,net9'
        type: string
      dry_run:
        description: 'Run without making changes'
        required: false
        default: false
        type: boolean

jobs:
  sync-branches:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        target_branch: ${{ fromJSON(vars.TARGET_BRANCHES || '["net8","net9"]') }}
      fail-fast: false

    steps:
      - name: Check PAT_TOKEN exists
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::PAT_TOKEN secret is not configured"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Check if sync is needed
        id: check
        run: |
          if ! git ls-remote --heads origin ${{ matrix.target_branch }} | grep -q ${{ matrix.target_branch }}; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "::warning::Target branch ${{ matrix.target_branch }} does not exist"
            exit 0
          fi

          git checkout main
          git checkout ${{ matrix.target_branch }}

          if git merge-base --is-ancestor main ${{ matrix.target_branch }}; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "No new commits to sync"
          else
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            echo "New commits found, sync needed"
          fi

      - name: Sync changes
        if: steps.check.outputs.needs_sync == 'true'
        id: sync
        run: |
          set -euo pipefail

          TARGET="${{ matrix.target_branch }}"
          DOTNET_VER=$(echo "$TARGET" | sed 's/[^0-9]*//g')
          NEXT_VER=$((DOTNET_VER + 1))

          # Create sync branch from target
          sync_branch="sync-main-to-${TARGET}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$sync_branch" "$TARGET"

          # ── Load .sync-exclude list ──
          EXCLUDE_FILES=()
          if [ -f ".sync-exclude" ]; then
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -n "$line" ] && EXCLUDE_FILES+=("$line")
            done < .sync-exclude
            echo "📋 Loaded ${#EXCLUDE_FILES[@]} files from .sync-exclude"
          fi

          # ── Save excluded files from target branch before merge ──
          echo "📦 Saving version-specific files from $TARGET..."
          mkdir -p /tmp/excluded-files
          for excl in "${EXCLUDE_FILES[@]}"; do
            if [ -f "$excl" ]; then
              mkdir -p "/tmp/excluded-files/$(dirname "$excl")"
              cp "$excl" "/tmp/excluded-files/$excl"
              echo "  Saved: $excl"
            fi
          done

          # ── Load .sync-overrides rules ──
          declare -A PRESERVE_VALUES
          OVERRIDE_RULES=()
          if [ -f ".sync-overrides" ]; then
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/#.*//' | xargs)
              [ -n "$line" ] && OVERRIDE_RULES+=("$line")
            done < .sync-overrides
            echo "Loaded ${#OVERRIDE_RULES[@]} override rules from .sync-overrides"
          fi

          # ── Save "preserve" values from target branch before merge ──
          for rule in "${OVERRIDE_RULES[@]}"; do
            IFS='|' read -r file element action <<< "$rule"
            if [ "$action" = "preserve" ] && [ -f "$file" ]; then
              val=$(grep -oP "<${element}>\K[^<]+" "$file" 2>/dev/null || echo "")
              if [ -n "$val" ]; then
                PRESERVE_VALUES["${file}|${element}"]="$val"
                echo "  Saved ${element}=${val} from $file"
              fi
            fi
          done

          # ── Merge main into sync branch ──
          echo "🔀 Merging main into $TARGET..."
          merge_failed=false
          if ! git merge main --no-edit -m "Merge main into ${TARGET}" 2>/dev/null; then
            echo "⚠️  Merge conflicts detected — auto-resolving..."

            # Get list of conflicted files
            conflicted_files=$(git diff --name-only --diff-filter=U 2>/dev/null || true)

            for file in $conflicted_files; do
              is_excluded=false
              for excl in "${EXCLUDE_FILES[@]}"; do
                if [ "$file" = "$excl" ]; then
                  is_excluded=true
                  break
                fi
              done

              if [ "$is_excluded" = true ]; then
                # Keep target branch version for excluded files
                git checkout --ours -- "$file" 2>/dev/null || true
                echo "  Kept $TARGET version: $file"
              else
                # Accept main version for everything else
                git checkout --theirs -- "$file" 2>/dev/null || true
                echo "  Accepted main version: $file"
              fi
              git add "$file" 2>/dev/null || true
            done

            # Complete the merge
            if ! git commit --no-edit 2>/dev/null; then
              echo "::error::Failed to complete merge"
              merge_failed=true
            fi
          fi

          if [ "$merge_failed" = true ]; then
            echo "::error::Merge failed and could not be resolved"
            exit 1
          fi

          echo "✅ Merge completed"

          # ── Restore excluded files from target branch ──
          RESTORED_FILES=()
          echo "Restoring version-specific files..."
          for excl in "${EXCLUDE_FILES[@]}"; do
            if [ -f "/tmp/excluded-files/$excl" ]; then
              cp "/tmp/excluded-files/$excl" "$excl"
              git add "$excl"
              RESTORED_FILES+=("$excl")
              echo "  Restored: $excl"
            fi
          done

          # ── Apply .sync-overrides rules ──
          OVERRIDE_DETAILS=()
          for rule in "${OVERRIDE_RULES[@]}"; do
            IFS='|' read -r file element action <<< "$rule"
            [ ! -f "$file" ] && continue

            current_val=$(grep -oP "<${element}>\K[^<]+" "$file" 2>/dev/null || echo "")
            [ -z "$current_val" ] && continue

            case "$action" in
              version-major)
                new_val=$(echo "$current_val" | sed "s/^[0-9]\+\./$DOTNET_VER./")
                ;;
              framework)
                new_val="net${DOTNET_VER}.0"
                ;;
              version-range)
                new_val="[${DOTNET_VER}.0.0,${NEXT_VER}.0.0)"
                ;;
              preserve)
                key="${file}|${element}"
                new_val="${PRESERVE_VALUES[$key]:-$current_val}"
                ;;
              *)
                echo "  Unknown action: $action"
                continue
                ;;
            esac

            if [ "$current_val" != "$new_val" ]; then
              sed -i "s|<${element}>${current_val}</${element}>|<${element}>${new_val}</${element}>|g" "$file"
              git add "$file"
              OVERRIDE_DETAILS+=("${file}: \`${element}\` ${current_val} -> ${new_val}")
              echo "  Override: ${element} ${current_val} -> ${new_val} in ${file}"
            else
              echo "  Unchanged: ${element}=${current_val} in ${file}"
            fi
          done

          # ── Save details for PR comment ──
          {
            echo "RESTORED_FILES<<EOFRF"
            printf '%s\n' "${RESTORED_FILES[@]}"
            echo "EOFRF"
            echo "OVERRIDE_DETAILS<<EOFOD"
            printf '%s\n' "${OVERRIDE_DETAILS[@]}"
            echo "EOFOD"
          } >> $GITHUB_ENV

          # ── Stage and amend if there are post-merge fixes ──
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "Apply version-specific overrides for ${TARGET}"
          fi

          echo "📋 Final state:"
          git log --oneline -3

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🏃 Dry run — not pushing"
            exit 0
          fi

          # ── Push ──
          if git push origin "$sync_branch" 2>/dev/null; then
            echo "sync_branch=$sync_branch" >> $GITHUB_ENV
            echo "push_repo=${{ github.repository }}" >> $GITHUB_ENV
          else
            FORK_OWNER="${{ vars.FORK_OWNER || 'arcenox' }}"
            FORK_URL="https://${{ secrets.PAT_TOKEN }}@github.com/${FORK_OWNER}/TickerQ.git"
            git remote add fork "$FORK_URL" 2>/dev/null || git remote set-url fork "$FORK_URL"
            if git push fork "$sync_branch"; then
              echo "sync_branch=$sync_branch" >> $GITHUB_ENV
              echo "push_repo=${FORK_OWNER}/TickerQ" >> $GITHUB_ENV
            else
              echo "::error::Failed to push to both origin and fork"
              exit 1
            fi
          fi

      - name: Ensure labels exist
        if: steps.check.outputs.needs_sync == 'true' && env.sync_branch != ''
        run: |
          gh label create "automated" --description "Automated PR" --color "0E8A16" 2>/dev/null || true
          gh label create "sync" --description "Branch synchronization" --color "1D76DB" 2>/dev/null || true
          gh label create "${{ matrix.target_branch }}" --description "Target: ${{ matrix.target_branch }} branch" --color "FEF2C0" 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Create Pull Request
        if: steps.check.outputs.needs_sync == 'true' && env.sync_branch != ''
        run: |
          PR_BODY="## Automated Branch Sync

          This PR merges recent changes from \`main\` into \`${{ matrix.target_branch }}\`.

          ---
          _Created automatically by branch sync workflow_"

          if [ "${{ env.push_repo }}" = "${{ github.repository }}" ]; then
            gh pr create \
              --base "${{ matrix.target_branch }}" \
              --head "${{ env.sync_branch }}" \
              --title "Sync main → ${{ matrix.target_branch }}" \
              --body "$PR_BODY" \
              2>&1 | tee pr_output.txt
          else
            FORK_OWNER=$(echo "${{ env.push_repo }}" | cut -d'/' -f1)
            gh pr create \
              --base "${{ matrix.target_branch }}" \
              --head "${FORK_OWNER}:${{ env.sync_branch }}" \
              --repo "${{ github.repository }}" \
              --title "Sync main → ${{ matrix.target_branch }}" \
              --body "$PR_BODY" \
              2>&1 | tee pr_output.txt
          fi

          PR_NUMBER=$(grep -oP '(?<=pull/)\d+' pr_output.txt || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "automated,sync,${{ matrix.target_branch }}" 2>/dev/null || true
            echo "pr_number=$PR_NUMBER" >> $GITHUB_ENV
            echo "Created PR #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Add sync details comment
        if: steps.check.outputs.needs_sync == 'true' && env.pr_number != ''
        run: |
          COMMENT="### Sync Details\n\n"

          # Excluded files restored
          if [ -n "${{ env.RESTORED_FILES }}" ]; then
            COMMENT+="#### Excluded files restored from \`${{ matrix.target_branch }}\`\n"
            COMMENT+="_These files have version-specific implementations and were kept as-is (defined in \`.sync-exclude\`)._\n\n"
            while IFS= read -r file; do
              [ -n "$file" ] && COMMENT+="- \`${file}\`\n"
            done <<< "${{ env.RESTORED_FILES }}"
            COMMENT+="\n"
          else
            COMMENT+="#### Excluded files\nNo excluded files were restored.\n\n"
          fi

          # Version overrides applied
          if [ -n "${{ env.OVERRIDE_DETAILS }}" ]; then
            COMMENT+="#### Version overrides applied\n"
            COMMENT+="_Rules from \`.sync-overrides\` were applied to match \`${{ matrix.target_branch }}\` versions._\n\n"
            COMMENT+="| File | Property | Change |\n"
            COMMENT+="|------|----------|--------|\n"
            while IFS= read -r detail; do
              if [ -n "$detail" ]; then
                file=$(echo "$detail" | cut -d: -f1)
                rest=$(echo "$detail" | cut -d: -f2-)
                COMMENT+="| \`${file}\` | ${rest} |\n"
              fi
            done <<< "${{ env.OVERRIDE_DETAILS }}"
            COMMENT+="\n"
          else
            COMMENT+="#### Version overrides\nNo overrides were needed.\n\n"
          fi

          echo -e "$COMMENT" | gh pr comment "${{ env.pr_number }}" --body-file -
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

  summary:
    needs: sync-branches
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Generate summary
        run: |
          echo "## Branch Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.sync-branches.result }}" = "success" ]; then
            echo "All branch syncs completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "Some branch syncs failed — check individual job logs" >> $GITHUB_STEP_SUMMARY
          fi
